body:
  text: 太乙金鏡式經卷六唐王希明撰推太乙七術序推太乙臨津問道一推獅子反擲二推白雲捲空三推猛虎相拒四推雷公入水五推白龍得雲六推回軍無言七推三才以占天地八推長短以占緩急九推五音以占災變十推孤單以占成敗十一推內外以占攻擊十二推多少以占勝負十三推隂陽以占厄會十四推所主以占吉凶十五推太乙七術序太乙術者昔玄女傳授於黃帝黃帝獲之敗蚩尤於涿鹿則前術也其後范蠡習之佐越王勾踐而平吳國終成霸業治平嬴秦失道炎漢將興張良用輔沛公西入關中子嬰銜璧東會垓下項羽摧鋒若然入則為師出授將略或攻或守靡不喻茲其法有心故謂之七術焉推臨津問道術一臨津問道者常以吕申加敵兵起年當視大神之下是破年又以吕申加破年大神下是破月又以吕申加破月大神下是破日又以吕申下加破日大神下是破時假令敵以甲子年起兵征便以吕申加子則大神臨卯則敵當在丁卯年五月酉日子時破也推獅子反擲術二獅子反擲者常以吕申加敵起年常視大神之下臨囚死休合破如在旺相間則不破假令敵以甲戌年起兵便以吕申加戌則大神臨丑丑且屬艮在東北即知其敵當在辛卯年破也推白雲捲空術三白雲捲空者謂兩陳相敵則課太乙悉宜主客便以吕申加主大將宫看大神囚死休廢者若展旗交鋒攻戰大敗若臨冠帶士卒戰死若臨帝王不可觸犯假令兩軍相見太乙上元第一紀第二局太乙在一宫武德為天目主算七大將七參將一寅為計神始擊將臨大武客算十三大將三參將九先以吕申加主大將七宫則大神臨一宫金神火克金經曰我尅者囚此名主大將乘囚氣則主大敗次以吕申加客大將於三宫則大神臨九宫水神經曰生我者為相此名大神乘相氣則大勝也推猛虎相拒術四猛虎相拒者視敵下營日以吕申加其日太乙大神臨王相其營不可攻擊衰死兼墓其營不久見破矣假令上元第一紀第七局庚午日下營其日太乙在三宫便以吕申加三宫則大神臨九宫木神經曰生我為相此名大神乘相氣此宫不可攻也推雷公入水術五雷公入水者常以吕申加太乙宫看大神所臨之下宫若尅主大將宫將必死尅參將亦然若尅客大將必厄尅參將亦然不然則士卒奔逃背叛矣假令上元第一紀第一甲子元十三局丙子日太乙在六宫大炅為為天目主算十八大將八參將四寅為計神始擊將臨太陽客算十九大將九參將七便以吕申加太乙於六宫則大神臨八宫屬水主大將八宫亦屬水經曰同類為王此為主大將乘王氣勝客大將九宫屬木大神臨八宫屬水生我者為相此名主大將乘相氣亦主小勝推白龍得雲術六白龍得雲者以吕申加其日太乙宫視大神大將所臨下之宫與主乘旺相宜出軍下營加臨囚死休墓不可出軍若彼陳大將宫刑尅我軍大將宫出戰必死尅小將亦然也假令上元第一甲子元二十二局乙酉日太乙在九宫隂德為天目主算十六大將六參將八巳為計神始擊將在天道客計三十大將三參將九便以吕申加太乙於九宫則大神臨大武於七宫主大將在六宫屬金大神下宫生主大將宫經曰生我者為相此名主大將乘相氣於下營屯軍吉客大將在三宫屬土與大神下營同類為旺此名客大將乘旺氣亦利屯軍下營吉推回軍無言術七回軍無言者常以吕申加彼軍初來時日太乙宫看大神下若彼軍臨旺相其下有伏兵宜備之如臨囚死休廢彼軍自破無能為也立可克之如臨本軍旺相亦自宜埋伏兵士假令上元第一紀第一甲子元二十八局辛卯日太乙在二宫吕申為天目主算十四大將四參將二亥為計神始擊將在大炅客計得九大將九參將七便以吕申加彼軍初來時日太乙在二宫則大神臨太蔟金神客大將在九宫屬木大神屬金金來尅木我尅者為死此客大將乘死氣無伏兵自破立可克之經曰欲知諸將休旺者常以同類為旺生我為相尅我為死我尅為囚我生為休假今髙叢木以吕申大炅同類為旺以大義地主為相武德太蔟為死和德大武太陽天道為囚大神大威為休餘倣此推三才以占天地人八三才者天地人也若算中無十者無天天變則二曜虧蝕五緯失度彗孛飛流霜雹為害也此為算得一二三四五六七八九為無天者也經曰算中無五者為無地地有變山崩地震川竭蝗蝻之象此算得一二三四十一十二十三十四二十一二十二二十三二十四三十一三十二三十三三十四此無地也經曰若算得一十二十三十四十為無人人有變口舌妖言更相殘賊疾疫遷移流亡也推長短以占緩急九經曰天目所算主以長算宜緩短算宜急十一以上為長單九以下為短長多利深入短少利淺入長為勝短為負也推五音以占災變十經曰算得一二為宫宫有變占在君經曰一為官二為比宫宫有變占在君經曰算得三為徴四為比徴徴有變占在宗廟經曰算得五為羽羽有變占在后妃經曰五為比羽羽有變占在后妃經曰算得七為商商有變占在子孫經曰算得九為角十為比角角有變占在疾病推孤單以占成敗十一經曰算孤單以占主客成敗一三七九為單陽二四六八為單隂一十三十為孤陽二十四十為孤隂單陽並孤陽為重陽單隂并孤隂為重隂單隂算并不利下不利客單陽算不利上不利主人也推內外以占攻擊十二經曰算有內外以占攻擊者為天目前為內可以攻外後為外可以攻內天目外孤內虛欲舉百事於外欲得外算於內欲得內算隂德至太陽為內大炅至隂為外也推多少以占勝負十三經曰多少以占勝負者客以多算臨少主人敗客以少算臨多主人勝也推隂陽以占厄會十四經曰太乙在陽宫算得奇為重陽厄在火太乙在隂宫算得偶為重隂厄在水若主人得主厄若客得客厄也推所主以占吉凶十五經曰算有所主以明吉凶謂十為將軍五為吏士一為兵卒無此算者凶若數得十六以上將吏卒備百事吉也太乙金鏡式經卷六
