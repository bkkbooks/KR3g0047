body:
  text: 太乙金鏡式經卷五唐王希明撰推積年法推君基太乙法推臣基太乙法推民基太乙法推五福太乙法推大遊太乙法天目大煞附推小遊太乙積年法推四神太乙法推天乙太乙法推地乙太乙法推直符太乙法推三元五紀地乙直符立成鈐推積年法自上元甲寅之嵗至大唐開元十二年甲子嵗積得二十八萬五千一十一算臣今恐速要自漢安帝元初甲寅為近至開元十二年甲子嵗積得六百十一算推君基太乙法經曰君基所臨之地至宜服其地或幸其方以應兆也置上元以來以大周三百六十去之不盡為入周以來年數置入周以來年數以三十除之為邦數不滿為入邦以來年數其邦數命起戍邦順行十二邦算外得君基所在也推臣基太乙法經曰臣基所臨之分宜進獻以供聖人也置上元積年以來以大周法三百六十去之不盡為入周以來年數置入周以來年以小周法三十六除之不盡為入周以來年數又以三約之為邦數不滿為入邦以來年數命起戍邦順行十二邦算外即臣基所在也推民基太乙法置上元積年以大周法三百六十去之不盡為入周以來年數又以小周十二去之不盡為入小周以來年數置小周以來年命起戌邦順行十二邦算外即民基太乙所在也推五福太乙法經曰五福太乙所臨之分無兵革疾疫飢荒水旱之災行宫有五四十五年移一宫二百二十五年一周其一曰黃祕宫在西河之乾地西北方也其二曰黃始宫在遼東之艮地東方也其三曰黃室宫在東吳之巽地東南方也其四曰黃庭宫在西蜀之坤地西南方也其五曰玄師宫在京都洛陽之地中原也置上元積年以來至開元十二年甲子嵗積得一萬三千三百三十一嵗若上考往古每年減一下檢將來每年加一置積年以大周法二百二十五去之不盡為入周以來年數又以四五約之為宫之不滿為入宫以來年數命起乾艮巽坤中宫算外即五福所在也今開元十二年甲子在遼東十一年也推大遊太乙入紀年及天目法紀法七百二十以六紀通周得紀法也元法四千三百二十是六紀數亦名元紀也乘行率一百二十太乙小周二百八十八以八乘三十六得行率太乙行宫三十六以三乘十二也天目周率二百一十六以十二乘十八天目行率十八自上元甲寅嵗太乙在七宫天道為天目子為計神三十六年一移宫命起七宫順行八宫不遊中五為大遊所在也自上元甲寅嵗距今開元十二年甲子積一萬三千三百三十一年上元年以來以元法除之得元數也不盡為入元年也以紀除之得紀數不盡為入紀年也今從晉穆帝永和十年甲寅為上元至今開元十二年甲子計三百七十一年也不足以紀法除之即為入上元第一紀三百七十一年推大遊太乙所在天目大煞附經曰大遊太乙者巡考八宫與小遊同宫一考三十六年十二年治天十二年治地十二年治人考較人君善惡二百八十八年一周而行其伐太乙在陽宫遼東不見兵太乙在隂宫蜀漢可以全身八三四九為陽宫二十七六一為隂宫置上元甲寅所求積年以元法四千三百二十去之不盡為元以來年數以大遊小周法二百八十八去之得周數不盡以三十六除之為宫數不盡為入宫以來年數其宫數命起七宫順行八宫不遊中五算外即大遊太乙所在宫推大遊天目所在法置上元以來積年以天目元法七十二去之不盡以天目周法十八去之命起天道順行十六神遇大武隂德重留一算外即天目所在也推小遊太乙積年法與四神天乙地乙直符同用置演紀上元甲子嵗至大唐開元十二年甲子嵗積得三千三百六十一算置積以小遊大周法二百四十去之不盡以小周二十四除之不盡以三約之為宫數不滿入宫以來年數命起一宫順行八宫不遊中五算外即得小遊太乙所在及入宫以來年數也小遊主事見在嵗計中自此不復載天目亦然也推四神太乙法經曰四神太乙者水神也紀綱有道之代則昌無道之代則殃若臨克賊之鄉兼君無道則兵革水旱飢荒也置上元甲子所求積年以一百八十去之不盡以三十六除之為紀數不滿算外為入紀來年數其紀數命起第一紀算外即得四神太乙所在及入紀以來年數也入紀有五三十六為一紀第一甲子第二庚子第三丙子第四壬子第五戊子置入紀年以三除之為宫數不滿為入宫以來年數命起一宫順行盡九宫又以絳宫明堂玉堂接之算外即得四神太乙所在及入宫以來年數也推天乙太乙法經曰天乙太乙者金神也取六宫金氣主兵革若纍年兵革相接者天乙臨之即有勝負為金能決斷主兵喪也置入紀年與四神同以三除之為宫數不滿算外為入宫以來年數命起六宫順行盡九宫又以三宫接之算外即得天乙太乙所在及入宫以來年數也推直符太乙法經曰直符太乙者火神也乃天帝之使者天遣觀察理道於萬民若臨無道之邦即兵革水旱疾疫飢饉流亡也置入紀年與四神太一同以三除之為宫數不滿為入宫以來年數命起五宫順行盡九宫又以三宫接之算外即直符太乙所在及入宫以來年數也四神三元五紀立成天乙地乙直符同太嵗四神上元中元下元天乙上元中元下元地乙上元中元下元直符上元中元下元甲子一九五六二絳九五一五一九乙丑一九五六二絳九五一五一九丙寅一九五六二絳九五一五一九丁卯二絳六七三明絳六二六二絳戊辰二絳六七三明絳六二六二絳己巳二絳六七三明絳六二六二絳庚午三明七八四玉明七三七三明辛未三明七八四玉明七三七三明壬申三明七八四玉明七三七三明癸酉四玉八九五一玉八四八四玉甲戌四玉八九五一玉八四八四玉乙亥四玉八九五一玉八四八四玉丙子五一九絳六二一九五九五一丁丑五一九絳六二一九五九五一戊寅五一九絳