body:
  text: 太乙金鏡式經卷八唐王希明撰九宫分野并序一宫兾州二宫荆州三宫青州四宫徐州五宫豫州六宫雍州七宫梁州八宫兖州九宫揚州絳宫交州明堂益州玉堂幽州推九宫分野昔者元始無象太素流形對越在天以為元首則記所謂冬居營窟夏居橧巢飲血茹毛未有麻絲者也及燧人鑚火庖犧出震風宗下武炎祚昌基晝夜無聞其規歸一揆也黄帝則東海江南登崆躡岱至於昆峰振蠻風山訪道存諸汗竹未可厚誣髙陽任地依神帝嚳順天行義東踰蟠木西濟流沙北至幽陵南撫交趾日月所經舟車所至莫匪王臣不踰茲域帝堯時禹平水土以為九州虞舜厥功彌劭表禋類而分區宇判山河而考疆域兾北創并部之名燕齊起幽營之號則書所謂肇十有二州者夏功至於唐堯殷亦無所損益周武克商自豐徂鎬至成王時改作禹貢梁徐入并青雍兾野拆於幽并職方掌天下之土以别厥州保章辨九州之野皆有星分焉九州分野躔次魏太史令陳卓因費直蔡邕月令章句頗有先後乃重訂郡國所入宿度皆不取止取天文玉厯森羅紀内躔次為正角亢氐鄭兖州在天三十八度在地三十二度東郡入角一度魯地東平任城山隂入角六度濟北陳留入亢五度泰山入角十二度濟隂入氐一度郟東入氐七度房心宋豫州在天十度在地十四度潁州入房一度汝南入房二度沛郡入房四度梁國入房五度淮陽入心一度魯國入心三度楚國入心四度尾箕幽燕州在天二十七度地同凉州入箕中十度上谷入尾一度漢陽入尾三度右北平入尾七度西河上郡北地遼西遼東入尾十度涿郡入尾十一度渤海入箕一度樂浪入箕三度𤣥莬入箕六度廣陽入箕九度凉州入箕十度斗牽牛須女吳越揚州在天四十一度在地四十三度九江入斗一度廬江入斗六度豫章入斗十度丹陽入斗十六度㑹稽入牛一度臨江入牛四度廣陵入牛八度泗水入女一度六安入女六度閩在牛女之交虚危齊青州在天二十七度地三十四度齊國入虚六度北海入虚九度濟南入危一度樂安入危四度東莱入危九度平原入危十一度菑州入危十四度營室東壁衛并州在天二十七度地三十五度安定入營室十一度天水入營室八度隴西入營室四度酒泉入營室十一度張掖入營室十二度武都入東壁一度金城入東壁四度武威入東壁六度燉煌入東壁八度奎婁胃魯徐州在天十五度地十八度東海入奎一度瑯琊入奎六度膠東入胃一度昴畢趙兾州在天二十九度地三十四度魏郡入昴一度鉅鹿入昴三度常山入昴一度廣平入昴七度中山入昴八度清河入昴九度信都入畢三度趙郡入畢八度安平入畢十四度河間入畢十度真定入畢十三度觜參魏益州在天三十度地三十七度廣漢入觜一度越嶲入觜三度蜀郡入參一度犍為入觜三度牂牁入參五度巴蜀入參八度漢中入參九度益中入參七度東井輿鬼秦雍州在天三十三度地三十七度雁門入井十六度定襄入井八度雲中入井一度代郡入東井二十八度太原入東井二十九度上黨入輿鬼二度栁七星張周三輔在天十四度地同𢎞農入栁一度河南入七星三度河東入張一度河内入張九度翼軫楚荆州在天三十七度地同南陽入翼六度南郡入翼十度江夏入翼十二度桂陽入軫六度零陵入軫十一度長沙入軫十三度武陵入軫十度甲齊乙東夷丙楚丁南蠻戊韓己魏庚秦辛西戎壬燕癸北狄子齊丑吴寅燕卯宋辰鄭巳楚午周未秦申晉酉趙戌魯亥衛一宫兾州得保安定瀛兾深洺磁相西南盡河之地也兾州按禹貢周禮并為河内之地舜置十二牧其一也春秋元命包曰昴畢散為兾州為趙國其地有險有易帝王所都亂則兾安弱則兾强荒則兾豐州南北濶大分衛以西為并州燕以北為幽州周人因焉兾貝相衛懐澤潞絳晉隰汾石代并邢蔚趙鎮定瀛幽易平檀營沁蒲朔雲忻二宫荆州得施黔黄郢信陽分與國及荆南以西之地也荆州禹貢荆及衡陽之地舜置十二牧其一也周禮曰正南荆州春秋元命包曰軫星散為荆州强也言其氣强躁亦曰警也言南蠻數為冦􅊇其人有道後服無道先强常警備也又云取名為荆山七國時其地楚分荆峽郢辰鼎施襄邵隨安黄申鄂澧岳潭衡栁永連沔三宫青州得齊青淄濰宻登莱及遼東之地也青州按禹貢為海岱之地舜置十二牧則其三一也於舜以青州越海又乃分為營州則遼東本為青州故以為名也春秋元命包曰虚危流為青州青齊莱宻菑樂濟徳平四宫徐州得宿全徐兖沂淮陽連海之地也徐州按禹貢海岱及淮之地舜置十二牧其一也於周入青州之地春秋元命包曰亢氐流於徐州因徐丘以立徐州也徐沂海泗瑯膠莱安丘五宫豫州得東京南京曹軍廣濟亳虢陜及京西信陽之地也豫州按禹貢為荆州河内之地周禮曰豫者舒也中和之氣性理安舒也春秋元命包曰鈎鈐列為豫州自華山東至淮北自濟南界荆山秦并天下為三川豫洛鄭宋亳曹汝汴陳潁商虢鄧沛梁淮邳六宫雍州得永興河西渭水岷山西北𤓰沙之地也雍州按禹貢黒水西河之地舜置十二牧則其一也以其四山之地故以雍名焉亦為西北之地陽所不及隂陽氣雍閼也周禮曰雍州盖并禹梁州之地周自武王克商都於酆鎬雍州為王畿及平王東遷洛陽以岐鎬之地賜秦襄公為秦地累外都至始皇遂平六國至漢光武都洛陽闗中復置雍州焉雍華同岐邠鄜綏銀延丹慶原靈沙伊㑹夏鹽勝豐秦渭蘭河廓鄯凉甘肅七宫梁州得全疊石階成鳯商金房及泗州滁施黔之地梁州按禹貢華陽黒水之地舜置十二牧其一也言西方金之氣剛故因名焉周禮職方氏以梁并雍漢不立州名以其地為益州及獻帝初平六年以臨江縣屬永寧郡劉備據於蜀又分廣漢之葭萌涪城梓潼白水四縣改葭萌曰漢夀魏泰始三年分益州為梁州於漢中焉益金房巴渠成鳯興利蜀劍梓遂嘉涪渝䕫卭嵋陵資瀘戎牂黔果梁洮疊岷宕武扶隴嶲八宮兖州得北京滑濮濟蘄澶恩徳博濵滄汾乾寧永凈之地也兖州按禹貢濟河之地舜置十二牧則其一也周禮東北曰兖州春秋元命包曰氐星為兖州端信也又云盖取兖水以為名焉兖鄆濟魏滄徳泰山東平東郡任城山隂濟北濟隂郟東九宫揚州得潮福建江浙淮南徐宿亳黄連海之地揚州按禹貢淮海之地舜置十二牧其一也周禮東南曰揚州春秋元命包曰牽牛流為揚州分為江南之氣操勁厥性輕揚亦曰州界多水水勢波揚故曰揚也於古則荒服之國戰國時其地分為楚也揚濠夀光蘄舒和潤宣蘇越杭欽婺處睦饒瀘梧亷崖歙吉乾表洪循潮髙瑞邕雷杜鬱交膝震廣絳宫絳宫交州按禹貢揚州之域是為南越之土秦始皇略定揚越以南戍卒五十萬人守五嶺自北徂南入越之道必由嶺嶠時有五處故曰五嶺也遂定南越為桂林南海象等三郡非三十六郡之限乃置南海尉以典之合浦交趾新昌武寧九真日南九徳象林明堂明堂益州按禹貢及舜置十二牧其一也為梁州之域周合梁為雍州之地春秋元命包曰參宿流為益州益之為言阨也亦曰疆壤益大故以名焉成都犍為汶山漢嘉江陽越巂牂牁蜀郡益中廣漠玉堂玉堂幽州按禹貢兾州之域舜置十二牧其一也周禮東北曰幽州春秋元命包曰箕星散為幽州分為燕國北方太隂故以幽㝠為號漢髙帝分上谷置涿郡武帝置十三州幽依舊名不改幽州范陽燕國右北平廣谷廣寜代郡遼西太乙金鏡式經卷八
