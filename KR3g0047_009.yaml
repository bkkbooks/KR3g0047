body:
  text: 太乙金鏡式經卷九唐王希明撰推敵國動靜法推敵使言虛實法推敵國有無問諜法推敵來方面法推太乙所在兵法推始擊將臨二十八舍法推太乙上下二目與太隂相并推敵國動靜經曰欲知敵國動靜者當用日時決之若客計得諸五八門杜塞則敵不來若門具將發不掩迫關格主客俱會太乙前此則所間皆吉敵來降不為冦若占北方事天目數轉而南行者為來轉而北行者不來矣假令隂遁第三紀第五十二局乙卯時太乙在八宫陽德為天目巳為計神始擊將臨太蔟客計得七大將七參將一此為五將發隂陽和主客俱會北方又敵轉而北方如此則敵來不為盜推敵使言虛實經曰欲知使言虛實者當用太乙所制以時決之若太乙能制客目客大將則敵使言實而可信若客目尅太乙宫反此言虛不可信也假令陽遁第一紀二十五局戊子時占其時太乙在一宫地主為天目寅為計神始擊將臨大義客算四十大將四宫參將二宫太乙在一宫屬金客大將四屬木以金制木則敵言實可信之推敵國有無間諜經曰欲知敵國有無間諜者當視天目以決之假令太乙在一宫太蔟為天目從太蔟至一宫為前內却從太蔟至七二九為前外從大義八三四行去為後內若客目臨隂主是為敵人入我境宜備之假令陽遁第一紀第二局乙丑時太乙在一宫大蔟為天目丑為計神始擊將在隂主客計得一客大將一此局主客目與大將俱會太乙前內下如此則敵之將卒並入我境宜設備防之也推敵來方面法經曰塵埃起烽火舉射敵將多少有將無將從何方來者若將在陽有賊在隂無賊陽竒隂耦之數也若算得十六以上隂陽和賊來有將卒其數必多若算十五以下賊少無將若天目臨左從東方來臨右從西方來諸五八門杜塞賊不來假令陽遁第一紀第八局辛未時占賊太乙在三宫為陽有賊在陽竒之宫陽德為天目未為計神始擊將在大武客算二十二隂陽和則賊未有將有卒其數多客目臨左賊從西方來推太乙所在兵法宜居一祀西北方以牛脯三分酒三杯白絹為藉大將再拜祝曰一宫太乙萬神護吾三軍令敵莫敢當我算得一出軍步卒在前車騎次之大將居中出門無剽掠宜居二祀正南方以牛脯三分酒三杯赤絹為藉大將再拜祝曰二宫太乙萬神護吾三軍令敵莫敢當我算得二出軍步卒在前車騎次之大將居中出門無剽掠宜居三祀東北方以牛脯三分酒三杯黃絹為藉大將再拜祝曰三宫太乙萬神護吾三軍令敵莫敢當我算得三出軍步卒在前車騎次之大將居中出門無剽掠宜居四祠正東方以牛脯四分酒四杯青絹為藉大將再拜祝曰四宫太乙萬神護吾三軍令敵莫敢當我算得四出軍步卒在前車騎次之大將居中出門無剽掠宜居六祀正西方以牛脯六分酒六杯白絹為藉大將再拜祝曰六宫太乙萬神護吾三軍令敵莫敢當我算得六出軍步卒在前車騎次之大將居中出門無剽掠宜居七祠西南方以牛脯七分酒七杯黃絹為藉大將再拜祝曰七宫太乙萬神護吾三軍令敵莫敢當我算得七出軍步卒在前車騎次之大將居中出門無剽掠宜居八祀正北方以牛脯八分酒八杯黑絹為藉大將再拜祝曰八宫太乙萬神護吾三軍令敵莫敢當我算得八出軍步卒在前車騎次之大將居中出門無剽掠宜居九祠東南方以牛脯九分酒九杯青絹為藉大將再拜祝曰九宫太乙萬神護吾三軍令敵莫敢當我算得九出軍步卒在前車騎次之大將居中出門無剽掠若算得單五十五二十五三十五皆為杜塞無門不利出軍宜深溝髙壘畫地而守之吉注云用遁缺推始擊將臨二十八舍法古法云始擊將者熒惑之精隨嵗計所遷臨二十八舍於嵗中各有所主之事矣東方七舍臨角大人有憂兵出臨亢主民有疾疫之災臨氐內有叛臣憂火災臨房主人君將相災臨心諸王憂臨尾後宫驚恐后妃有災臨箕兵起北方七舍臨斗爵祿關梁閉塞臨牛米貴民飢犧牲多死臨女后妃有疾病憂火災臨虛諸侯有憂更政令或有赦臨危主嵗多疾死者又有土工兵起臨室大人匿謀嵗不收臨壁文章興兵發西方七舍臨奎有下臣為孽臨婁山林有冦道路不通臨胃五榖不收臨昴胡人疾病燕趙兵臨畢有兵刑罰相用臨觜將叛牛馬疾行臨參有移動事將有憂南方七舍臨井川瀆滿溢小有兵動臨鬼后妃失勢民多疫疾臨栁民飢饉流亡臨星憂火災臨張禮儀多變易臨翼隂陽失序多雨水臨軫有死喪也推太乙上下二目與太隂相并經曰太乙文昌將始擊與太隂并太隂者太嵗後二辰是也主其年必有鄰國進婉淑之女入奉王庭假令太乙在一宫太隂在戌亥是也若文昌將與太隂并憂上相與女主挾謀事若始擊將與太隂并憂上將與妃主懷二事被制之者尤甚驗也推太乙與太嵗格經曰太嵗格太乙格者主有崩亡兵役之事太乙在三宫太嵗在未申當有掃星出東北助太嵗西南國前敗東北國後敗若掃星出西南方反之皆東北主流亡疫疾太乙在四宫太嵗在酉當有太白出西方助太嵗東國前敗西國後敗太乙在八宫太嵗在午當有熒惑出南方助太嵗北國前敗南國後敗若辰星出南方反之兵革喪亡也太乙在九宫太嵗在戌亥當有彗孛西北方助太嵗東南國前敗西北國後敗若彗孛出東南反之主兵喪疾疫以上太乙在三四八九來格午未申酉戌亥嵗而言之此六年皆煞氣如若有妖星出見其方凶君王以修德禳之矣餘年皆生氣惟格對無害故不言之太乙金鏡式經卷九
