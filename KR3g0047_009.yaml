body:
  text: 太乙金鏡式經卷九唐王希明撰推敵國動靜法推敵使言虚實法推敵國有無問諜法推敵来方面法推太乙所在兵法推始擊將臨二十八舍法推太乙上下二目與太隂相并推敵國動靜經曰欲知敵國動靜者當用日時决之若客計得諸五八門杜塞則敵不来若門具將發不掩迫闗格主客俱㑹太乙前此則所間皆吉敵来降不為冦若占北方事天目數轉而南行者為来轉而北行者不来矣假令隂遁第三紀第五十二局乙夘時太乙在八宫陽徳為天目巳為計神始擊将臨太蔟客計得七大将七參将一此為五將發隂陽和主客俱㑹北方又敵轉而北方如此則敵来不為盗推敵使言虚實經曰欲知使言虚實者當用太乙所制以時决之若太乙能制客目客大將則敵使言實而可信若客目尅太乙宫反此言虚不可信也假令陽遁第一紀二十五局戊子時占其時太乙在一宫地主為天目寅為計神始擊將臨大義客筭四十大將四宫參將二宫太乙在一宫屬金客大將四屬木以金制木則敵言實可信之推敵國有無間諜經曰欲知敵國有無間諜者當視天目以决之假令太乙在一宫太蔟為天目從太蔟至一宫為前内却從太蔟至七二九為前外從大義八三四行去為後内若客目臨隂主是為敵人入我境宜備之假令陽遁第一紀第二局乙丑時太乙在一宫大蔟為天目丑為計神始擊將在隂主客計得一客大將一此局主客目與大將俱㑹太乙前内下如此則敵之將卒並入我境宜設備防之也推敵来方面法經曰塵埃起烽火舉射敵將多少有將無將從何方来者若將在陽有賊在隂無賊陽竒隂耦之數也若筭得十六以上隂陽和賊来有將卒其數必多若筭十五以下賊少無將若天目臨左從東方来臨右從西方来諸五八門杜塞賊不来假令陽遁第一紀第八局辛未時占賊太乙在三宫為陽有賊在陽竒之宫陽徳為天目未為計神始擊將在大武客筭二十二隂陽和則賊未有將有卒其數多客目臨左賊從西方来推太乙所在兵法宜居一祀西北方以牛脯三分酒三杯白絹為藉大將再拜祝曰一宫太乙萬神䕶吾三軍令敵莫敢當我筭得一出軍步卒在前車騎次之大將居中出門無剽掠宜居二祀正南方以牛脯三分酒三杯赤絹為藉大将再拜祝曰二宫太乙萬神䕶吾三軍令敵莫敢當我筭得二出軍步卒在前車騎次之大將居中出門無剽掠宜居三祀東北方以牛脯三分酒三盃黄絹為藉大將再拜祝曰三宫太乙萬神䕶吾三軍令敵莫敢當我筭得三出軍歩卒在前車騎次之大將居中出門無剽掠宜居四祠正東方以牛脯四分酒四盃青絹為藉大將再拜祝曰四宫太乙萬神䕶吾三軍令敵莫敢當我筭得四出軍歩卒在前車騎次之大將居中出門無剽掠宜居六祀正西方以牛脯六分酒六盃白絹為藉大將再拜祝曰六宫太乙萬神䕶吾三軍令敵莫敢當我筭得六出軍歩卒在前車騎次之大將居中出門無剽掠宜居七祠西南方以牛脯七分酒七杯黄絹為藉大將再拜祝曰七宫太乙萬神䕶吾三軍令敵莫敢當我筭得七出軍歩卒在前車騎次之大將居中出門無剽掠宜居八祀正北方以牛脯八分酒八杯黒絹為藉大將再拜祝曰八宫太乙萬神䕶吾三軍令敵莫敢當我筭得八出軍歩卒在前車騎次之大將居中出門無剽掠宜居九祠東南方以牛脯九分酒九杯青絹為藉大將再拜祝曰九宫太乙萬神䕶吾三軍令敵莫敢當我筭得九出軍歩卒在前車騎次之大將居中出門無剽掠若筭得單五十五二十五三十五皆為杜塞無門不利出軍宜深溝髙壘畫地而守之吉注云用遁缺推始擊將臨二十八舍法古法云始擊將者熒惑之精隨嵗計所遷臨二十八舍於嵗中各有所主之事矣東方七舍臨角大人有憂兵出臨亢主民有疾疫之災臨氐内有叛臣憂火災臨房主人君將相災臨心諸王憂臨尾後宫驚恐后妃有災臨箕兵起北方七舍臨斗爵禄闗梁閉塞臨牛米貴民飢犧牲多死臨女后妃有疾病憂火災臨虚諸侯有憂更政令或有赦臨危主嵗多疾死者又有土工兵起臨室大人匿謀嵗不收臨壁文章興兵發西方七舍臨奎有下臣為孽臨婁山林有冦道路不通臨胃五榖不收臨昴胡人疾病燕趙兵臨畢有兵刑罰相用臨觜將叛牛馬疾行臨參有移動事將有憂南方七舎臨井川瀆滿溢小有兵動臨鬼后妃失勢民多疫疾臨栁民飢饉流亡臨星憂火災臨張禮儀多變易臨翼隂陽失序多雨水臨軫有死喪也推太乙上下二目與太隂相并經曰太乙文昌將始撃與太隂并太隂者太嵗後二辰是也主其年必有隣國進婉淑之女入奉王庭假令太乙在一宫太隂在戌亥是也若文昌將與太隂并憂上相與女主挾謀事若始擊將與太隂并憂上將與妃主懐二事被制之者尤甚騐也推太乙與太嵗格經曰太嵗格太乙格者主有崩亡兵役之事太乙在三宫太嵗在未申當有掃星出東北助太嵗西南國前敗東北國後敗若掃星出西南方反之皆東北主流亡疫疾太乙在四宫太嵗在酉當有太白出西方助太嵗東國前敗西國後敗太乙在八宫太嵗在午當有熒惑出南方助太嵗北國前敗南國後敗若辰星出南方反之兵革喪亡也太乙在九宫太嵗在戌亥當有彗孛西北方助太嵗東南國前敗西北國後敗若彗孛出東南反之主兵喪疾疫以上太乙在三四八九來格午未申酉戌亥嵗而言之此六年皆煞炁如若有妖星出見其方凶君王以修徳禳之矣餘年皆生氣惟格對無害故不言之太乙金鏡式經巻九
