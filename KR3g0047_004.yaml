body:
  text: 太乙金鏡式經卷四唐王希明撰推三門具不具推五將發不發推主客相闗推主客推出師推障向背法推置陣隨地法推隨地置變推太乙在天外地内法推風雲飛鳥助戰法推竒兵伏兵法推對陣有雲氣定勝負推三門具不具古法曰三門者謂開休生三門也若太乙天目在開生二門下為兩門不具若在休門下為三門不具嵗計州郡遇三吉門下為大吉景門小吉若在死驚傷杜門下者大凶也置演紀上元甲子所求積年與小遊同以二百四十去之不盡以三十約之為直門數不盡筭外即直門所入年命起開門次休生左行八門周而復始者也假令上元甲子開門為直使滿三十年即休門為直使他倣此年月日時直使同此法時計八門在第一卷門篇内也推五將發不發經曰五將發不發謂始擊将無掩擊文昌将無囚迫主客大小将無相闗即門具将發也若開休生三門具五将自然相㑹也若三門不具不可出兵五將不發不可臨戰也推主客相闗法古者言太乙主客相闗者以林虎淵蛟而為喻盖取勢不兩立物無雙存之義大抵與敵相遇事不得已當看客闗得主人則客勝主人闗得客則主勝皆用日計納音以决之所謂闗者取五行相制之道也假令髙叢為地目木神也太蔟為天目金神也金制木此為客闗得主人客勝也假令隂主為地目土神也地主為天目水神也土能制水此謂主人闗得客主人勝也推主客經曰主客者先後之理動靜之義也古法曰陳兵原野先動者為客後應者為主若安居之勢先動者為主後應者為客若得三門具五將發隂陽和稱兵所向必克先勝後負若三門不具五将不發隂陽不和則不利舉兵宜固守吉欲知主客出入之者東以隂徳南以和徳西以大炅北以大武為始發之神以定主客所起歸之神也客欲知主視其筭所知也主人欲知客亦視其筭所知也推出師法經曰行師必出竒門略地并用其二古法人君須出其畧地及安置諸軍者筭十二二十二三十二五将發三門具乃可出兵畧地擇便處以出軍故曰畧地幷用二竒門者為出開休生三吉門也推陳兵向背筭得一出軍宜西北戰利東南背深澗隠匿之地用方陣舉白旗筭得二出軍宜正南戰利向正北邪道向西南背山邑火光耀耀焦之地用直陣舉青旗筭得四出軍宜正東戰利向正西背林木窮道曲堤之地用鋭陣舉赤旗筭得五出軍宜正北戰利向正南背積土負城邑山林之地用曲陣舉黒旗不然深溝髙壘固守吉筭得六出軍宜正西戰利向正東背水澤塹於丘墟之地用方陣舉白旗筭得九出軍宜東南戰利向西北背髙山丘陵積土之地用鋭陣舉赤旗今則太乙兵起鄉陣隨於地觀方制變皆筭稱神此用兵之神道也推制陣隨地法經曰置陣者曲陣為水鋭陣為火直陣為木方陣為金圓陣為土皆取主客置陣次以五行相尅而取勝負不知置陣之法皆取地形而置之若地形後髙前下則為鋭陣利以進戰以潰其敵也前髙後下不便進退利以近鬬宜為直陣以守之以疲敵力若地洿邪不便於戰者宜為圓陣利以堅守若地髙而平宜為方陣利以四向以通敵也若左右勢髙則宜為曲陣以吞敵若地順其向則吉若地反其向則凶今則太乙兵起之鄉陣隨其地觀方置變運變稱神此用兵之法也推隨地制變晁錯曰善兵臨戰合用之急者有三一曰士卒服習二曰隨其地形三曰善用兵器五丈之溝居塹之水山林積石川澤丘阜草木所臨此步兵之地也車騎三不當一土水平陵曼衍相屬平原廣野此車騎之地也歩兵十不當一兩陣相近平地淺草可前可後此長㦸之地劍楯三不當一萑葦竹蕭草木蒙籠枝葉接茂此矛鎚之地也弓弩三不當一平陽相逺山谷幽澗仰髙臨下此弓努之地也短兵百不當一士不選練卒不服習起居不精動靜不禁避難不及前擊後解與金鼓之指相失此多勤卒之過也百不當一兵不完利與空手同中不能入與無鏃同此将不習兵之過也十不當一兵法曰器械不利以其卒與敵也卒不可用以其將與敵也將不知兵以其主與敵也君不擇將以其國與敵也此四者兵之要也是以太乙用兵之道克敵於未来制勝於未兆臨敵觀變在於将也故曰出兵當從奇門臨敵隨形制變此之要也推太乙在天外地内法古法曰太乙在八三四宫者為地内宫助主人太乙在九二七六宫者為天外宫助於客若助主人之時原野不利先起若助客時安居不利先起經曰欲為客待太乙在天外之時欲為主候太乙在地内之時又須得門具將發則决勝也推竒伏法經曰能識竒伏變禍為福為釋五兵之義也竒兵之法若有百人以三十人為竒兵若有千人以三百人為竒兵若有萬人以三千人為竒兵隨地伏形不可常也古者伏兵必敗大煞之地望敵鼓譟而發大煞之地天目所臨之下也得十二二十二三十二之時伏兵經曰伏藏隠跡必居其一筭十一二十一三十一之時藏於山林溝澗之中人不能見也經曰伏兵必用掩迫之時也故伏兵待敵来掩襲者必取掩迫太乙軍可發若賊急則伏兵於要害也推太乙風雲飛鳥助戰法經曰助戰之法常須觀風雲之勢察飛鳥之情若太乙所在宫有風雲飛鳥䓁来衝格迫擊太乙者大敗之兆若迫擊大將宫者主敗若從主目上去擊客客敗若從客目上擊主主敗若從主人形上来客敗若有風雲飛鳥從太嵗太隂月建上来擊主人主人敗擊客客敗若有風雲飛鳥扶主人陣者主人勝扶客陣者客勝若其日有逥風起伏飛鳥旋轉於陣中旗折大敗之兆若衆来噪陣者及有風雲衝突主人陣主人敗衝突客陣客敗也推陣有風雲氣定勝負臣按前篇但雲氣在敵上擊我我敗者大義如此中不無至妙令世之言假令敵在北方若有黒氣氣在敵陣上敵大勝若壬癸日彌佳若白雲氣在敵陣上敵欲罷陣求和若青雲氣在敵陣上將寛緩急擊則平若紅雲氣在敵陣上客勝若黄雲氣在敵陣上大敗壬癸彌惡也假令敵在南方若有赤雲氣在敵陣上大勝丙丁日彌佳若青雲氣在敵陣上欲罷陣求解若黄雲氣在敵陣上敵將遲鈍急擊則平若白雲氣在敵陣上失利若黒雲氣在敵陣上敵大敗丙丁日彌惡假令敵在西方有白雲氣在敵陣上庚辛日彌佳若得黄雲氣在敵陣上欲求解若黑雲氣在敵陣上將寛緩急擊平若青雲氣在敵陣上敵敗若赤雲氣在敵陣上敵大敗庚辛日彌惡假令敵在東方若青雲氣在敵陣上大勝甲乙日彌佳若黑雲氣在敵陣上欲求和若赤雲氣在敵陣上敵將遲鈍然不可擊若黄雲氣在敵陣上大敗甲乙日彌惡此諸雲氣在敵陣上既然若在我陣上亦爾諸勝氣動利大勝雖得勝雲氣若斷續不次或南北潰亂亦敗若得敗雲氣堅實動大利則雖得敗氣若斷續潰亂不至全惡若對陣之時若勝雲氣在大將上大勝參將上參將勝若敗雲氣反此則前諸格迫或太乙雲氣皆須約其方面審候雲氣勝負以定吉凶若都無雲氣多少方分無戰或復相匀也太乙金鏡式經卷四
