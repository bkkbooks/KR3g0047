body:
  text: 太乙金鏡式經卷二唐王希明撰推太乙所在法推五將所主法推九宫所主法推八門所主法推十六神所主法推太乙式儀法推太乙運式法推太乙用式不同法推隂陽和不和推帝王年紀推太乙所在法傳曰太乙者天帝之神也主使十六神知風雨水旱兵革飢饉疾疫災害之國也常考之順行八宫不遊中五三年徙一宫第一年治天齊日月星辰使七曜無差其度以明天道所臨之分承天道而行則獲治天之考第二年治地調四氣八風能使風雨不愆其候以明地道所臨之分無興土木之功役人民妨稼穡則獲治地之考第三年治民使君臣父子長㓜無失其序以明人道所臨之分進忠良察獄訟恤孤寡則獲治人之考古太乙考治天下若無道之國失禮之君恃干戈恣侵伐則兵灾水旱飢饉流亡以行其罰若守道安民戢兵禁暴則五緯不愆度四民無失業故經云太乙所臨之國有道則昌無道則殃樂産云能使日月無光五緯孛現山崩地震川湧河竭者也推五將所主法五將者太乙監將幷上下二目主客大小將也監將者東方嵗星之精受木徳之正氣王在春三月上目者南方熒惑之精受火徳之正氣在天為陽號始擊將屬客王在夏三月下目者中宫鎮星之精受土徳之正氣在地為隂號文昌將屬主王在四季客大將者北方辰星之精受水徳之正氣主兵革王在冬三月主大將者西方太白之精受金徳之正氣主戰鬬王在秋三月又五將各應五方隨四時各有休王經云主客兩陣相當乘生氣者勝乘死氣者敗假令八月攻東方以太蔟為始擊將乘生氣也大勝若髙叢為始擊將乘死氣也大負他倣此嵗計者嵗星之使也謂計嵗月日時之事也是故聖人則而象之創法而制局太乙為人君二目法輔相五將定主客八門分勝負運沉機扵罇爼之間突雄略扵幃幄之内盖王佐之要道也推九宫所主法昔燧人氏仰觀北極而定方包犧氏因畫八卦帝宣受命使大撓造甲子容成以造厯數八卦九宫之㫖自此興焉九宫之義法以靈龜以二四為肩六八為足左三右七戴九履一此為不易之常道也黄帝又命風后為太乙式九宫皆差一位自晉以前莫詳所以推郭璞曜靈經云地缺東南宫數多者不出於九故差九以填之樂産曰太乙寄理以明人事后王得之以統一天下所以差一宫以就乾位王希明曰太乙統人事以知未米之道故聖人特差一宫以明先知之義也一宫在乾主兾州并州若文昌將闗囚必有迫脇君父之象矣二宫在離主荆州若太乙臨之君誅大臣將相矣三宫在艮主青州若始撃臨之嬖寵進中宫兵起四宫在震主徐州若始擊臨之主西戎来侵六宫在兑主雍州若客大將臨之南楚来侵七宫在坤主梁益州若主天將臨之梁益二州兵起八宫在坎主兖州若太乙臨之臣欺君也九宫在巽主揚州若客大將臨之幽兾二州来侵張良經云八三四九為陽二七六一為隂一宫為純陽九宫為純隂五月一隂生至戌月單陽亥月絶隂戌亥在一宫之地故曰絶陽十一月一陽生至辰月單隂巳月純陽辰巳在九宫之地故曰絶隂凡六四為絶氣二午八子冬夏之至位隂陽交易之地故曰絶氣凡至陽絶之氣與事皆凶也推八門所主法𤣥女云天有八門以通八風也地有八方以應八卦之綱紀四時主於萬物者也開門直乾位在西北主開向通達休直坎位正北主休息安居生門直艮位東北主生育萬物傷門直震位正東主疾病灾殃杜門直巽位東南主閉塞不通景門直離正位南主鬼怪亡遺驚恐奔走死門直坤位在西南主死喪𦵏埋驚門直兑位正西主驚恐奔走開休生三門大吉景門小吉驚門小凶死傷杜大凶八莭八門各主王四十五日遇王以戰勝吉不王凶推十六神所主法爾雅云四時和為玉燭律厯志曰太極運三辰五星於天元氣轉三五流行於下地也子神曰地主建子之月陽氣初發萬物隂生故曰地主也丑神曰陽徳建丑之月二陽用事布育萬物故曰陽徳也艮神曰和徳冬春將交隂陽氣合羣物方生故曰和徳也寅神曰吕申建寅之月陽氣大申草木甲拆故曰吕申也夘神曰髙叢建夘之月萬物皆出自地叢生故曰髙叢也辰神曰太陽建辰之月雷出震勢陽氣大盛故曰太陽也巽神曰太炅春夏將交盛暑方至陽氣炎酷故曰太炅巳神曰太神建巳之月少隂用事隂陽不測故曰太神午神曰大威建午之月陽附隂生刑暴始行故曰大威也未神曰天道建未之月火能生土土王於未故曰天道也坤神曰大武夏秋將交隂氣施令殺傷萬物故曰大武申神曰武徳建申之月萬物欲死薺麥將生故曰武徳也酉神曰太蔟建酉之月萬物皆成有大品蔟故曰太蔟也戌神曰隂主建戌之月陽氣不長隂氣用事故曰隂主也乾神曰隂徳秋冬將交隂前生陽大有其情故曰隂徳也亥神曰大義建亥之月萬物懐垢羣陽欲盡故曰大義推太乙式儀法黄帝受命龍馬負圖而出河因體其象而制太乙式體有三重上青法天下黄法地中體象人即天地人三才悉備天有十二辰地有十二次四維八門九宫十二神咸有象焉推太乙運式法經云運式之儀有八一詳太嵗所在欲求計神故先詳之第二詳太乙所在宫以立監將第三詳何神為天目以置文昌始擊諸神也第四詳何神為計神以知主客計第五詳何神為始擊以計神加和徳宫求文昌所臨宫以艮為鬼門方求幽冥吉凶故加和徳而計之第六視天地二目各在何所求主客之筭第七詳置筭之數以定主客大將之宫第八論主客置筭若得十置一若得二十四棄二十置四餘皆以例而推之各視天目所在宫而行筭若天目在正宫則按本數若天目間神則加一數而行筭至太乙宫止矣假令太乙在九宫大義為天目後大義一筭地主八筭和徳三髙叢四計得十六餘倣此推太乙用式不同法禮設尊卑易陳貴賤臣行君道則政悖子行父道則義乖故用式之道事各不同洪範曰洪者大也範者法也言天地之大法也王省維嵗王所有嵗兼總羣吏如嵗兼四時也卿士惟月卿士各有所掌如月之有别也師尹惟日象正官之吏分治其職如嵗有日也嵗月日時無易各順其常故王者用嵗計卿士惟月計師尹惟日計故時通上下則上自天子下及庶士時通用也推隂陽和不和張良經曰隂陽和不和者謂太乙及上下二目就筭數以相配下目立正宫為陽立間神為隂立陽筭得竒為重陽立隂筭得偶為重隂則不和上目所臨陽宫筭得重陽為重臨正二宫筭得竒也臨隂宫筭得隂為重隂為臨間神筭得偶也若在陽筭得偶隂筭得竒為隂陽和和則吉筭十一十三十七十九三十一三十三三十七三十九為陽數目臨為重陽筭中隂陽若筭得二十二二十四二十六二十八為隂皆不和也太乙在陽宫筭得竒者為重陽之數八三四九為陽宫太乙隂宫筭得偶者為重隂之數二七六一為隂宫皆不和若太乙在隂宫陽竒筭得偶數者為隂陽和也王希明曰三九寅辰為純陽二八巳丑為雜陽二十六未亥為純隂七一戌申為雜隂三十三三十九為重陽二十二二十六為重隂二十四二十八為雜隂十三十九三十一三十七為雜陽皆以次凶尤甚太乙天目在隂位筭得純隂在陽位筭得純陽為内外有謀在純者勝太乙天目在隂位筭得重陽為内有謀若筭得十四十八三十三為上和二十三二十九三十二為次和十二十六二十七三十四三十八為下和若太乙天目立隂陽位而筭陽多者利為客隂多者利為主更須考其深淺以明勝負也推帝王年紀法臣希明自周厲王三十七年甲子為上元至大唐開元十二年甲子嵗通計積一千五百六十一年矣周厲王三十七年甲子入第一紀周幽王五年甲子入第二紀周恵王二十一年甲子入第三紀周桓王三年甲子入第四紀周定王十年甲子入第五紀周景王八年甲子入第六紀周敬王四十三年甲子入第一紀周威烈王九年甲子入第二紀周顯王十二年甲子入第三紀周赧王十八年甲子入第四紀秦始皇十年甲子入第五紀漢文帝三年甲子入第六紀漢武帝元狩六年甲子入第一紀漢宣帝五鳯元年甲子入第二紀漢平帝元始四年甲子入第三紀漢明帝永平七年甲子入第四紀漢安帝延光三年甲子入第五紀漢靈帝中平元年甲子入第六紀魏齊王正始五年甲子入第一紀晉恵帝永興元年甲子入第二紀晉哀帝興寧二年甲子入第三紀後魏太武元年甲子入第四紀後魏太和八年甲子入第五紀西魏太武文統十年甲子入第六紀隋文帝仁夀四年甲子入第一紀大唐髙祖龍朔四年甲子入第二紀大唐開元十二年甲子入第三紀太乙金鏡式經卷二
