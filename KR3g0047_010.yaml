  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3g0047_WYG_010-1a, image: WYG0810/WYG0810-0917a.png}
body:
  text: 太乙金鏡式經卷十唐王希明撰推天子巡狩推郡國舉賢良推太乙擇日推太乙擇時推嵗中災發推域名厄會推飛行四殺推九州域名推見聞虛實推望行人推執囚推求索推叛亡推雜事推天子巡狩古法曰欲知天子巡狩之事當視太乙與天目在四維之嵗則為天子巡狩若不出則遣使者按行風俗欲知出何方者以主目所臨起處決之假令天目在隂德出東方行在和德出南方行在大炅出西方行在大武出北方行推郡國舉賢良經曰欲知郡國舉賢良方正學藝之士者則須嵗計天地人具則郡國必然舉也王希明曰近立新術雖得天地人具又須是亥卯未三合之年則舉也經曰若嵗計遇十六以上為天地人算具則舉之若單九以下為不舉也推太乙擇日古法曰擇日之法有二若太隂九地之下曰利客太陽九天之上曰利主蓋非太乙元經之義臣等今刪而不取但以日計太乙局法看太乙局在何元紀宫分定上下無掩迫關擊則某日可以行師出軍征討興造百事反此俱不利也法曰天目以前為內以後為外一曰來在外或算得在外皆不得一曰天目掩內亦以前為內一曰主人在外皆不得一曰天目掩太乙得而更失一曰欲擊捕彼人則須知彼人藏匿之處當得太乙臨之又帶掩迫往必擒之所捕之地如王相必被辱敗也推太乙擇時法王希明曰新術有擇時之法上自人君諸王冡宰后妃將相卿大夫士庶人等各設算數而用之臣等今參詳此言屬乎膠柱非通儒之至論並皆削去斯不復録今所擇時但取時計太乙門具將發陽隂和主客無掩迫則為吉時用此征伐興造庶務百事利若用此法擇時極天人之際理通神明之德也推嵗中災發經曰以嵗合神遍加月建若天目掩格太乙即其月有災變假令上元甲子嵗天目起武德若太乙在一宫二月三月為掩八月九月為格若州郡君長運數厄會遇之者宜預防之推域名厄會法古法曰欲知州郡厄會常以吕申加域名太陽所臨之辰其州以兵徭為厄隂主所臨之辰其州以疾疫為厄假令荆州屬丁未當以吕申加未則太陽臨酉酉年其州有兵徭之厄隂主臨卯卯年有疾疫之厄李淳風曰先以吕申加域名之干次以呂申加域名之支併而推之今荆州屬丁未先以吕申加丁則太陽加辛隂主加乙次以吕申加未則太陽加酉隂主加卯當以辛卯年辛酉年有兵徭乙酉乙卯年有疾疫之厄也推飛行四殺古法曰若攻其域名與飛行四殺併合必有屠城之象常以隂主加域名地主下為災殺又以域名合神加域名災殺下為天賊殺月殺者孟月酉仲月巳季月丑隂殺下為天吏殺常以隂主加嵗月日時地主下為災殺又以嵗月日時合神加隂主災殺下為鬼殺月殺下為天敗殺也推九州域名法兾州丁丑荆州丁未青州癸丑徐州甲辰豫州乙巳雍州甲申梁州戊戌兖州乙未揚州癸酉益州辛丑幽州癸卯交州壬申又曰甲齊乙東夷丙楚丁南夷戊魏己韓庚秦辛西夷壬燕癸北夷又曰子周丑韓寅楚卯鄭辰晉巳吳午秦未宋申齊酉魯戌趙亥燕推見聞虛實法古法曰若聞事以時計占之若天目掩迫太乙聞不善事實聞善事虛若門具將發聞吉則吉聞凶亦凶若四郭固杜聞吉不吉聞凶則凶經曰重陽有重吉重隂有重凶皆以重陽重隂併數決之推望行人法古法曰主人數在南方客數亦在南方此為自得主人之數焉不來又法曰望北方人得北方算不來得南方算來掩迫關格者未來又曰望北方人得八三不來得二七來又望東方人得四九不來得一六來望西方人六一不來得九四來望南方人得七二不來八三來各以算數論之也算近一日來一曰以天目算決之數得二算二日至或數得三三日至若數盡行人即至也推執囚古法曰天目掩迫太乙或主人在外或客立旺神皆吉宜對吏入獄易解一曰主人在內主人立旺神不可入獄對吏一曰太乙初入宫日入獄必遲留難解一曰太乙與主人同宫天目臨之入獄易出見貴人解憂患也推求索古法曰算得天目在內者吉可請謁見貴人及求財物皆得若天目在外者反此天目前為內後為外算得外為孤內為虛一曰主挾客不可請謁求索反此皆得若主人在內得在外不得一曰算得天目在內者謁人必在有求皆得利見貴人算得天目在外者訪人不見所求不得一曰天目格太乙見貴人請謁詞訟百事上下格之一曰主人立王神不可以請謁及見貴者一曰天目春夏得六秋冬得四皆不可用之推叛亡古法曰討捕叛亡當用時計以決之若客格主人或天目在內或太乙與主人同宫或天目臨之皆為捕得也主人挾客客算長天目在外皆不獲推雜事古法曰天目掩太乙出征興造買賣百事皆敗天目迫太乙行者見呵留客挾主人或得廢算并凶一曰門具將發隂陽和百事吉反此凶一曰凡占萬物皆以太乙立休旺神決之刑日天隂下霧空有風多也遊曲日天隂主有風雨半隂半晴大集日天隂主有夜雨晝有微少會曲日天隂主大旱傷田禾萬民災武曲日天隂主風損田禾也占雨日有無多少太乙日下雨上見日光太嵗日下雨風霧三刑日風隨日光止遊曲日風雨隨日光止大集日雨名乍雨未時止會曲日下雨午時日光止武曲日下雨福丙丁日止也太乙占雨法此法從未上數初一日順行十三日遇太乙太嵗等日必見有雨無雨之驗也太乙金鏡式經卷十
