body:
  text: 太乙金鏡式經卷三唐王希明撰推掩法推擊法推迫法推囚法推關法推格法推對法推四郭固法推四郭杜法推執提法推提挾法推太乙三門五將立成法推五子元積年立成法推陽局立成法推隂局立成法推掩法經曰始擊將臨太乙宫謂之掩嵗計遇之王綱失序臣張君弱宜修德以禳之蓋掩襲劫殺之義若掩太乙在陽絶之地君凶隂絶之地臣誅掩主大將主人算和吉不和凶參擊之勝推擊法經曰太乙所在宫客目在太乙前一辰為前擊在太乙後一辰為後擊在太乙前一宫為外宫擊在太乙後一宫為內宫擊所為擊者臣凌君卑凌尊下凌上僭也嵗計遇之將相相伐之義也推迫法經曰前為外迫後為內迫為上下二目主客大小四將在太乙左右為迫王希明曰上目無迫若下目在太乙前一辰為外辰迫在後一辰為內辰迫在太乙前一宫為外宫迫後一宫為內宫迫宫迫災微緩辰迫災急疾嵗計遇迫人君慎之推囚法經曰囚者篡戮之義也若文昌將并主客大小四將俱與太乙同宫總名曰囚若在陽氣絶氣之地大凶若在絶陽絶隂之地自敗臣受誅若諸將與太乙同宫或近大將謀在同類近參將謀在內也算和者利算不和者謀不成也推關法經曰客主大小將目相宫齊為關王希明曰關之為義但將相怕忌之事不及於君也主客大小將同宫數齊皆為關日推格法經曰客目大小將與太乙對宫為格言政事上下格也若在陽絶之地又與嵗計遇格不利有為所格者格易之義也若格太乙者盜侮其君主客算不和者必敗推對法經曰下目文昌將與太乙衝而相當者為對若下目相對之時皆為大臣懷二心君逐良將凶奸生下臣欺上推四郭固法經曰四郭固者文昌將囚大乙宫至大將參將又相關或客目臨之或客大小將相關皆四郭固也主人勝固者憑勝不利先起四郭之固嵗計遇之主篡廢之禍利以修德禳之也郭杜法經曰四郭杜者為客參將與文昌將并主大將與客大將并兼之掩迫關格提挾以出兵為閉杜不通及謀諸事不成嵗計遇之無大禍也推執提法經曰執提者為開生二門合衝皆為不利名為執提對為提格嵗計遇之不可舉事所謂開生二門合衝者假令開門為直事不可與開門合衝生門為直事不可與生門合衝大凶伍子胥曰三門皆不可與太乙相衝推提挾法李淳風云客主兩將或一將而共太乙挾客主目或大小將于正宫者為提挾若客主二目臨問神客主二將共太乙挾二目于間神謂之挾閉主人雖見提挾而在內猶可戰自一至四為內宫若囚死在陽絶氣者雖在外亦凶客雖提挾而在外猶可戰自九至六為外宫若在囚死及陽絶之地者雖在內亦凶嵗計遇提挾凶客主有內外迫者不利先起張良云客目大將參將挾主目客勝挾太乙先勝後敗主計目囚迫太乙客勝太乙三門五將立成勝敗鈐天目太乙一宫太乙二宫太乙三宫太乙四宫太乙六宫太乙七宫太乙八宫太乙九宫武德參將囚大將囚門具將發大將迫天目內迫大將迫天目外迫參將內迫大將迫參將囚主人小敗主人小勝客大勝主人小勝主人小勝主人勝主小勝主小敗太蔟天目內迫門具將發八門杜先起敗天目格參將囚大將囚門具將發門具將發大將迫小將迫主人勝客大勝主人勝主人勝主人勝客大勝客大勝主小勝隂主天目囚迫大將囚門具將發參將囚大小將迫門杜外迫門具將發大將格門具將發主小勝客大勝客大勝主人勝主人勝客大勝主人勝客大勝隂德關囚門杜門具將發門具將發天目外格大將格門囚大將天目天目格主勝客敗客大勝主勝主勝內外迫先起敗主人敗大義天目外迫杜門門具將發門具將發大將格大將囚天目內迫門具將發主人勝主人勝客大勝客大勝主人小勝客小勝大小將迫客大敗客大勝地主天目外迫天目格門具將發天目內迫門杜門具將發天目囚八門杜主人小勝小將囚客小勝客大勝大小將迫客大敗主人勝先勝後負大將門囚主人小勝主人勝陽德門具將發大將外迫天目內迫大將囚大將囚天目外迫參將囚門具將發客大勝客小勝小將囚客小勝主小勝客小勝大將迫主勝主勝客大缺和德大將關囚門具將發天目囚天目內迫八門杜門具將發天目外迫門具將發主大勝客勝大將關囚主人勝先起敗大小將囚主人大勝客勝客敗客大勝吕申大將格客大將關囚天目外迫門具將發大將關囚大將外迫八門杜先勝後敗主人勝大小將迫客大敗大將囚主人勝客大勝主人小勝主小勝先起敗髙叢大將外迫門具將發天目外迫天目囚大將關天目格參將囚八門杜門具將發天目內迫客大勝主小勝主人勝客小勝客先起後敗客大勝客大勝大小將迫客敗太陽八門杜主勝門具將發大將外迫大小將發門具將發小將關囚小將關囚天目內迫小將格客敗不利先起客大勝主小勝客大勝客大勝主小勝客小敗主勝大炅天目格天目內迫大將關囚天目外迫門具將發門具將發八門杜天目關囚大小將發主人勝大小將囚客大敗主人勝大將格客敗客大勝客大勝不利先起大將關囚主勝客敗大神大小將迫天目外迫八門杜大小將關大將外迫門具將發門具將發天目外迫主勝客敗大小將發主人勝不利先起囚主小勝主人勝客大勝客大勝大將外迫主人勝大威八門杜天目大將關大將外迫門具將發門具將發天目內迫先起敗囚主勝客敗主勝客大勝主大勝主大勝主人小勝大將格主大勝天道門具將發天目外迫大將囚大將格門具將發天目內迫八門杜參將囚客大勝主人勝客勝客大勝主人小勝參將格利先起客勝大武門具將發天目外迫天目格八門杜天目囚門具將發大將囚客大勝大將格主人勝客小勝先起敗大小將迫主大勝大小將囚客大敗客大勝主小