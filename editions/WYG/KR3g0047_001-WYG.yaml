body:
  text: 太乙金鏡式經卷一唐王希明撰推上元積年推太嵗所在推入六紀三元法推太乙所在法推天目所在法推計神所在法推太嵗支合神法推月計缺推六紀月建法推太乙月計差法推積月推閏月推月計太乙所在法推天目所在法推計神所在法推日計差法推積日幷􅃋法推日計太乙所在法推日計天目所在法推日計計神所在法推時計差法推求冬至推求次氣法推求加時法推太乙冬夏至入紀推冬至太乙時所在變行推夏至太乙加時所在變行推冬夏二至以後太乙所在法推隂陽二遁時計天目法推隂陽二遁時計計神法推時計太乙變卦法推求陽遁太乙直使法推求隂遁太乙直使法推二十四氣黄道日度所在立成法推黄道度數立成法推列宿十二分野立成法推太乙當時法推太乙𤣥命法推太乙考時法推八門用法推冬至加時所直門法推夏至加時所直門法推八卦八門占嵗計法推上元積年自上元以来嵗代綿逺紀法差殊雖設繁詞備而靡用今從上元甲子到唐開元十五年甲子嵗通前計四萬八百一筭臣按宋琨置元似童兒戯推求人紀之年下求不得日辰上求不得冬至自三百餘年學者何多逮於淳風但效尤而已臣今别修甲子元四分厯法與太乙同元舉而備用得上元甲子冬至引而下之齊距嵗計太乙行宫進不違於四分退不失於元紀自上元混沌甲子之嵗至今大唐開元十二年甲子嵗積得一百九十三萬七千二百八十一筭上考往古每年减一筭下檢將来每年加一筭推太嵗所在法置上元甲子積年以三百六十去之不盡以六十去之又不盡命甲子筭外即太嵗所在辰也推入六紀三元法置上元以来距所求積年以周紀法三百六十去之不盡以紀法六十去之所得為紀數不盡為入紀年數也積太乙所在法推上元積年以周紀法三百六十去之不盡以元法七十二去之又不盡以太乙小周法二十四除之又不盡以三約之為宫數不滿為入宫以來年數其宫數命起一宫順行八宫不遊中五筭外即得太乙所在及入宫以来年數也推天目所在法置上元積年以周紀法去之不盡以元法七十二去之又不盡以天目周法十八去之不滿者命起武徳順行十六神遇隂徳大武重留一筭外即天目所在推計神所在法置積年以紀法六十去之不盡命起寅宫􅊇行十二辰筭外即計神所在也推太嵗支合神法假令太嵗在子合神在丑􅊇行十二辰十二年一周天矣推六紀月建法一紀二甲仲辰甲子甲午二甲仲辰十一月建甲子太乙在一宫武徳為天目計神寅合神丑二紀二巳孟辰己已巳亥二紀孟辰十一月建甲子太乙在六宫地主為天目計神合神如上同三紀二甲季辰甲辰甲戌二甲季辰十一月建甲子太乙在一宫大炅為天目計神合神如上同四紀二巳仲辰已夘已酉二紀仲辰十一月建甲子太乙在六宫武徳為天目計神合神如上同五紀二甲孟辰甲申甲寅二甲孟辰十一月建甲子太乙在一宫地主為天目計神合神如上同六紀二巳季辰己丑己未二已季辰十一月建甲子太乙在六宫大炅為天目計神合神如上同凡三十有六紀三十年有三百六十箇月是以甲子甲午同建太乙天目計神合神用式之法一同嵗計之法占騐逆順其義亦等臣今為李淳風定時計五日六十時法以為月計五年六十箇月三十年有三百六十箇月若有閏月只以逐月節氣時刻為正也推太乙月計差法章嵗六百五十七章月八千七百二十六閏差二十秒二十七周紀法三百六十秒法二百推積月置積年所求年以章月乘之章嵗而一為積月不盡為閏餘若有餘月隨數加之推求閏月置閏餘每月加閏差及秒滿法從閏餘滿章嵗則閏月所在或六百三十秒者以上無中氣者詳之推太乙月計所在置積月以周紀法三百六十去之不盡以元法七十二去之又不盡以太乙小周法二十四去之不盡以三約之為宫數不滿為入宫月數命起一宫順行八宫不遊中五筭外即月計太乙所在也推天目所在置入月紀以天目周法十八去之不盡命起武徳順行十六神遇隂徳大武重留一筭外即天目所在也推計神所在置積月以紀法去之不滿者以周法十二去之不盡命起寅逆行十二辰筭外即計神所在也推日計差法日法四十九月法二千四百四十七􅃋䇿二十九小餘三十六紀法六十推積月􅃋法置積月以月法乘之日法而一為積日不盡為小餘以紀法除積日不滿為月餘命甲子筭外即所求年天正十一月經􅃋日辰及小餘也若更有餘日隨數加之求次月每月加二十九小餘三十六各加法求之弦望筭如大厯非此所須也臣按梁武帝天監三年甲申帝召太史虞履樂茂言之今日太乙在八宫和徳為天目文昌將外宫迫災輕無所畏也退謂人曰外宫迫為外人之迫也四十年後辰巳之年同於桓公大亨之嵗臣以日計太乙求之積至梁天監三年甲申嵗六月八日凡得七億七百五十萬一千六十一日以周紀法除之得一百九十六萬五千二百八十不盡以二百六十一小紀法除之得四不盡二十一為入第五紀也推日計太乙所在置積日以周紀法三百六十去之不盡者以元法七十二去之不盡以太乙小周法二十四去之又不盡以三約之為宫數不滿為入宫以来日數其宫數命起一宫不遊中五筭外即太乙所在也推月計天目所在置積月以元法七十二去之不盡以天目周法十八去之又不盡命起武徳順行十六神遇隂徳大武重留一筭外即天目所在也推日計計神所在置積日以紀法六十去之不盡者又以計神十二除之命起寅逆行十二辰筭外即計神所在也推時計差法全數二十六萬闕千八百四十三氣法三萬三千一百九十三辰法三千六百八十二小分十二分之也半辰法一千三百四十一小分十二分之四半求冬至法置積年减一以餘數乘之為氣法而一得積日不盡為小餘以紀法去積日不盡為大餘命大餘起甲子筭外即天正冬至日辰也求次氣法置天正冬至大小餘每氣加一十五日餘七十三千五秒滿二十四從小餘一滿氣法從大餘滿紀法去之即次氣大小餘也求加時法先置半辰法之數一千三百四十一以十二小分之四半以夏至小餘加之滿法而一所得為辰數命甲子筭外則氣應加時也不盡以三乘之辰法而一得數命為一辰中孟仲季數也求太乙冬夏至入紀陽遁太乙冬至起乾隂遁太乙夏至起巽凡一百八十二日三萬二千二百九十三分日之二萬三十五為太乙變行推冬至太乙加時變行臣希明按張良云太神變順氣為餘今置上元所求年天正積日及小餘先加半辰法以辰法除之得為加時辰數及置積日减一以十二乘之幷加時辰數為天正時實以周紀法去之不盡為入紀實置入紀實以太乙周法去之餘者以三約之為宫數不盡為入宫時數命起第一宫順行八宫不遊中五筭外即天正加時太乙所在宫也推太乙夏至加時所在變行置天正積日及小餘秒加陽遁一百八十二日三萬二千二百九十三分日之二萬三十五為小餘秒滿秒法從小餘一不盡為秒其小餘先加半辰法以辰法除之為加時辰數乃置積日减一以十二乘之幷入加時辰數為夏至加時實亦以周紀除之不盡為入紀實置入紀實以太乙周法二十四去之不盡以三約之為宫數不滿為入宫時數命起一宫順行八宫不遊中五筭外則為隂遁太乙變行也推冬夏二至以後太乙所在法置冬夏二至以來幷今日所求日减一以十二乘之先加冬夏二至時數并今加所求時數為冬夏二至後時實以太乙周法二十四去之不盡者以三約之為宫數不滿為入宫時數陽遁命起一宫順八宫不遊中五筭外即太乙所在宫隂遁命起九宫􅊇行八宫三時一移不遊中五筭外即隂遁太乙所在宫也推隂陽二遁時計計神法置時實各以十二去之餘者陽遁命起寅􅊇行十二辰隂遁命起申十二辰各一時一移筭外即隂陽二遁計神所在也推時計太乙變卦經云太公約之其師旅所要以明軍之吉凶張良與四皓等略定紀術陽遁太乙起乾而順行隂遁太乙起巽而􅊇行周旋八方理於八宫八方八卦八八六十四也六甲日時十二紀以主一卦六甲六十日凡七百二十時五日計漢四十日為一月六十時以為一紀故積一十二一紀配扵一卦自乾畢震四十八紀從從巽終兑四十八紀二紀相去有四卦一卦一十二紀故積四十八紀三紀一百八十時配於一氣臣以為從冬至夏至有二百四十日二千八百八十時以紀法除之得四十八紀兼之隂遁得四十八紀兼之隂遁得四百八十日五千七百六十時九十六紀此謂六紀同在冬夏至也若隨起百以四卦則有三十六紀此皆非缺得氣也三紀一百八十時配於一氣太公約之為二十四紀一卦一十二紀良與四皓等定為冬至十紀乾有一十二紀甲子甲午各推異神神位皆同是以并之為六紀巽卦亦然故有十二紀也五日六十時一移局格巽變為氣用變乾巽十二紀因為六十四卦三十六紀以配一嵗二十四氣而用之也推求陽遁太乙直使法冬至起乾六甲之日夜半在一宫以乾西北為一宫也六巳之日夜半在六宫以兑西方為六宫也順歴乾坎艮震四卦八宫順行四卦八宫之地是以不居中五也凡一百八十二日八分日之五太乙變行一卦主一節四節之日故為此數太乙變順行以為􅊇行乾一紀紀者禮也以六十時為一紀也二甲仲辰冬至六日甲子甲午為二甲仲辰夜半甲子太乙直使在一宫歴五日六十時三時一移順行八宫不居中五五日六十時一移宫便行八宫不遊中五為數一二三四六七八九宫也天目直使在武徳一時一移左行十六神乾坤二宫二時一移宫乾為天門坤為人門吉凶之主天目鬼星之使至於此門施法奉令故二時一移計神直使在寅右行十二辰乾一紀二甲仲辰夜半甲子太乙在一宫武徳為天目計神寅乾二紀二巳孟辰夜半甲子太乙在六宫地主為天目計神寅乾三紀二甲季辰夜半甲子太乙在一宫大炅為天目計神寅乾四紀二已仲辰夜半甲子太乙在六宫武徳為天目計神寅乾五紀二甲孟辰夜半甲子太乙在一宫地主為天目計神寅乾六紀二巳季辰夜半甲子太乙在六宫大炅為天目計神寅求隂遁太乙直使之法夏至起巽六甲之日夜半在九宫以巽東南為九宫也六已之日夜半在四宫以震東方為四宫􅊇歴巽離坤兑四卦八宫􅊇行四卦八宫之地不遊中五也凡一百八十二日八分日之五太乙變行太乙變􅊇行以􅊇臨行也巽一紀二甲仲辰夜半甲子太乙在九宫吕申為天目計神申巽二紀二巳孟辰夜半甲子太乙在四宫大威為天目計神申巽三紀二甲季辰夜半甲子太乙在九宫隂徳為天目計神申巽四紀二已仲辰夜半甲子在四宫吕申為天目計神申巽五紀二甲孟辰夜半甲子太乙在九宫大威為天目計神申巽六紀二巳季辰夜半甲子太乙在四宫隂徳為天目計神申臣希明推此隂陽二遁定六紀之法並是張良所定之日法有定準氣無盈縮維以為常今更考較筭術度氣深淺然後推之以定宫次庶合深旨按張良時計六紀云二紀季辰冬至之日夜半甲子乾六宫紀太乙在六宫大炅為天目者乘氣而行則合冬至氣應太乙方在一宫武徳天目豈有纔入天正以行五紀一百八十二日八分日之五太乙小雪氣内太乙甲巳變行或在立冬氣終已經之紀則變化無復紀綱又云一百八十二日八分日之五若此則一年三百六十五日四分日之一中分言之若氣應則早晚或未之定臣今但以冬至氣應則太乙變行亦不分陽日隂日孟仲季辰以此為元又自乾畢震三十六紀計日而言始行一百八十日猶有二日八分日之五即却用乾之初紀至於氣變入幽行以司鬼事若氣應早晚斷在臨時夏至以後變順為􅊇從巽終兑唯前冬至以下十精命甲巳仲孟季等悉皆倣此帝問曰張良與四皓有所未通乎荅曰是何言歟張良所言己未日冬至入乾之六紀者謂上元之時甲已仲辰冬至在乾之一紀若至己未望初甲子巳在乾之六紀此則相望而言凡設法規矩事合如此非諸冬至皆類於斯也且四計之中時計尤要失之毫髪將何敢用臣以開元十八年三月二十日於含元殿帝問太乙神騐豈有錯謬誤吉凶之應騐乎推二十四氣黄道日度所在立成法冬至斗九度小寒斗二十四大寒女八立春危二雨水室一驚蟄室一春分奎四清明婁二榖雨胃四立夏昴四小滿畢八芒種參六夏至井一小暑井二十七大暑栁八立秋張三處暑翼一白露翼十六秋分軫十三寒露角九霜降氐二立冬房一小雪尾六大雪箕三推黄道數立成北方斗二十四牛七女十一半虚二十五分半四分度之一危十八室十七壁十西方奎十七半婁十三胃十四半昻十一畢十六觜一參九南方井三十鬼三栁十四星七張十九翼十九軫十八半東方角十三亢九氐十六房五心五尾十七箕十半推列宿十二分野立成斗牛主吳越屬揚州交州丑女虚危主齊屬青州子室壁主衛屬幷州亥奎婁主魯屬徐州戍胃􅄧畢主趙屬兾州酉觜參主晉屬益州申井鬼主秦屬雍州未栁星張主周屬三河午翼軫主楚屬荆州巳角亢主鄭屬兖州辰氐房心主宋屬豫州夘尾箕主燕屬幽州寅右十二分野筭日在河宿計屬何辰以時加位立貴前後以論將之吉㓙推太乙當時法筭二至以後日度所在加時位加於時支也明太乙天目類時計終法立五將式之天乙朝暮治神甲日朝治小吉暮治大吉戊庚日反是己日朝治神后暮治恭送乙日反是丁日朝治登明暮治從魁丙日反是癸日朝治太乙暮治太衝壬日反是六辛之日朝治功曹暮治勝光不理魁罡二辰戍為天獄辰為天庭非貴所居也老將所在以宰殺推吉凶天乙貴神土主貴人接引升進王相吉囚死㓙前一螣蛇火主驚恐戰鬬凶前二朱雀火主文書口舌衣物凶前三六合木主凡事和合婚姻吉前四勾陳土主勾留戰鬭凶前五青龍木主遷官錢財婚姻吉後一天后水主蔽匿婦人淫亂事後二太隂金主隂人掌事吉後三𤣥武水主盗賊亡失財物凶後四太常土主財物金玉酒食吉後五白虎金主死亡哭泣兵刃道路凶後六天空土主萬物欺殆奴婢欺詐凶臣希明以為筭術時計立五將亦未能决定大小將之吉凶更以日度加時因歩六壬式知天乙成敗之分其主客諸將在此吉神下者吉若在凶神下凶若門具將發遇吉神則大吉若門杜閉塞凶神則先吉後凶若門杜閉塞遇吉神守固大利也假十月五日庚申時加戊寅入立冬氣六隂遁曰入第六紀壬子元二十七局太乙在九宫大武為天目午為計神巳為合神主筭得二十九主大將在九宫主參將在七宫以計神加和徳宫天目下臨髙叢卯客筭得單四客大將在四宫參將在二宫因歩天乙式立冬六日日在心宿加寅庚日天乙朝治大吉太乙在青龍下主大將在青龍下主參將在太常下客大將在六合下客參將在天定下以此觀之諸將吉凶定矣雖㣲有差未可近而取之推太乙𤣥命法天子𤣥命在天乙皇后𤣥命在天后公侯𤣥命在太常將軍𤣥命在勾陳九牧𤣥命在螣蛇常侍𤣥命在天空二千石𤣥命在青龍大夫吏士𤣥命在朱雀庶人𤣥命在行年推太公考時法右太乙左天目假令太乙在一宫天目臨在三宫是右太乙左天目隂陽和順上下無掩撃迫囚闗格對並不相四缺郭固杜又不提挾太乙不在陽絶之地神將獨立吉道清虗吉道謂開休生三門是也清虗謂門無凶惡之神也則三門具五將發利以行兵又合𤣥命王相挾和假令天子𤣥命於天乙臨在旺相之郷上下相生故曰合也門與𤣥命上天乙直使前三五後二四合者大吉推八門用法張良云陽遁冬至甲日夜半甲子以後開門直使丙日日中甲午以後生門直使己日夜半甲子以後驚門直使辛日日中甲午以後休門直使三十時移門隂遁夏至甲日夜半甲子以後杜門直使丙日日中甲午以後死門直使己日夜半甲子以後傷門直使辛日日中甲午以後景門直使三十時一移門也常以直門加太乙及主客大將隨數而行太乙三時一移大將一時一移也臣今太乙冬至夏至初臨之時門則隨數起時盡則移不拘其甲丙己辛日也陽遁四門開生驚休隂遁四門杜死傷景推冬至加時所直門法臣希明今置天正時實以二百四十去之不盡以一百二十去之不盡以三十約之為門數命起開門以次而行即天正冬至加時所直門也推夏至加時所直門法置夏至時實以一百二十去之不盡者以三十約之為門數闕而行之即夏至加時所直門也推八門占嵗計法李淳風云常以開門加太乙即太乙之八門也又以開門加主大將即主大將之八門也又以開門加客大將即客大將之八門也又以開門加定計大將即定計大將八門也本是太公考嵗計定八門立五將也又云客主八門與太乙八門開休生合者大利太乙天目在主客三門下者閉塞不通今云客主八門與太乙八門開休生三門合者大利臣今别立新術置上元甲子以来距所求積年求嵗計八門以大遊紀法七百二十去之不盡以三分紀法二百四十除之餘以三十約之為直門數不盡即直門所入年命起開門以次休生門左行八門周而復始假令今開元十二年甲子即開門為直使至三十一年甲午嵗即休門為直使他皆倣此太乙金鏡式經巻一
