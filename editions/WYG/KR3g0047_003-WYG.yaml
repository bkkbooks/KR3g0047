body:
  text: 太乙金鏡式經卷三唐王希明撰推掩法推擊法推迫法推囚法推闗法推格法推對法推四郭固法推四郭杜法推執提法推提挾法推太乙三門五將立成法推五子元積年立成法推陽局立成法推隂局立成法推掩法經曰始擊將臨太乙宫謂之掩嵗計遇之王綱失序臣張君弱宜修徳以禳之盖掩襲刼殺之義若掩太乙在陽絶之地君凶隂絶之地臣誅掩主大將主人筭和吉不和凶參擊之勝推撃法經曰太乙所在宫客目在太乙前一辰為前擊在太乙後一辰為後撃在太乙前一宫為外宫擊在太乙後一宫為内宫撃所為撃者臣凌君卑凌尊下凌上僭也嵗計遇之將相相伐之義也推迫法經曰前為外迫後為内迫為上下二目主客大小四將在太乙左右為迫王希明曰上目無迫若下目在太乙前一辰為外辰迫在後一辰為内辰迫在太乙前一宫為外宫迫後一宫為内宫迫宫迫災㣲緩辰迫災急疾嵗計遇迫人君慎之推囚法經曰囚者簒戮之義也若文昌將并主客大小四將俱與太乙同宫總名曰囚若在陽氣絶氣之地大凶若在絶陽絶隂之地自敗臣受誅若諸將與太乙同宫或近大將謀在同類近參將謀在内也筭和者利筭不和者謀不成也推闗法經曰客主大小將目相宫齊為闗王希明曰闗之為義但將相怕忌之事不及於君也主客大小將同宫數齊皆為闗日推格法經曰客目大小將與太乙對宫為格言政事上下格也若在陽絶之地又與嵗計遇格不利有為所格者格易之義也若格太乙者盜侮其君主客筭不和者必敗推對法經曰下目文昌將與太乙衝而相當者為對若下目相對之時皆為大臣懐二心君逐良將兇奸生下臣欺上推四郭固法經曰四郭固者文昌將囚大乙宫至大將參將又相闗或客目臨之或客大小將相闗皆四郭固也主人勝固者憑勝不利先起四郭之固嵗計遇之主簒廢之禍利以修徳禳之也郭杜法經曰四郭杜者為客參將與文昌將并主大將與客大將并兼之掩迫關格提挾以出兵為閉杜不通及謀諸事不成嵗計遇之無大祸也推執提法經曰執提者為開生二門合衝皆為不利名為執提對為提格嵗計遇之不可舉事所謂開生二門合衝者假令開門為直事不可與開門合衝生門為直事不可與生門合衝大凶伍子胥曰三門皆不可與太乙相衝推提挟法李淳風云客主兩将或一将而共太乙挟客主目或大小將扵正宫者為提挟若客主二目臨問神客主二將共太乙挟二目扵間神謂之挟閉主人雖見提挟而在内猶可戰自一至四為内宫若囚死在陽絶氣者雖在外亦凶客雖提挾而在外猶可戰自九至六為外宫若在囚死及陽絶之地者雖在内亦凶嵗計遇提挟凶客主有内外迫者不利先起張良云客目大將參將挟主目客勝挟太乙先勝後敗主計目囚迫太乙客勝太乙三門五將立成勝敗鈐天目太乙一宫太乙二宫太乙三宫太乙四宫太乙六宫太乙七宫太乙八宫太乙九宫武徳參將囚大將囚門具將發大將迫天目内迫大將迫天目外迫參將内迫大將迫參將囚主人小敗主人小勝客大勝主人小勝主人小勝主人勝主小勝主小敗太蔟天目内迫門具將發八門杜先起敗天目格參將囚大將囚門具將發門具將發大將迫小將迫主人勝客大勝主人勝主人勝主人勝客大勝客大勝主小勝隂主天目囚迫大將囚門具將發參將囚大小將迫門杜外迫門具將發大將格門具將發主小勝客大勝客大勝主人勝主人勝客大勝主人勝客大勝隂徳闗囚門杜門具將發門具將發天目外格大將格門囚大將天目天目格主勝客敗客大勝主勝主勝内外迫先起敗主人敗大義天目外迫杜門門具將發門具將發大將格大將囚天目内迫門具將發主人勝主人勝客大勝客大勝主人小勝客小勝大小將迫客大敗客大勝地主天目外迫天目格門具將發天目内迫門杜門具將發天目囚八門杜主人小勝小將囚客小勝客大勝大小將迫客大敗主人勝先勝後負大將門囚主人小勝主人勝陽徳門具將發大將外迫天目内迫大將囚大將囚天目外迫參將囚門具將發客大勝客小勝小將囚客小勝主小勝客小勝大将迫主勝主勝客大缺和徳大將闗囚門具將發天目囚天目内迫八門杜門具將發天目外迫門具將發主大勝客勝大將闗囚主人勝先起敗大小将囚主人大勝客勝客敗客大勝吕申大将格客大将闗囚天目外迫門具将發大將闗囚大将外迫八門杜先勝後敗主人勝大小将迫客大敗大将囚主人勝客大勝主人小勝主小勝先起敗髙叢大將外迫門具將發天目外迫天目囚大將闗天目格參將囚八門杜門具將發天目内迫客大勝主小勝主人勝客小勝客先起後敗客大勝客大勝大小将迫客敗太陽八門杜主勝門具将發大將外迫大小将發門具将發小将闗囚小将闗囚天目内迫小将格客敗不利先起客大勝主小勝客大勝客大勝主小勝客小敗主勝大炅天目格天目内迫大将闗囚天目外迫門具将發門具將發八門杜天目闗囚大小将發主人勝大小将囚客大敗主人勝大将格客敗客大勝客大勝不利先起大将闗囚主勝客敗大神大小將迫天目外迫八門杜大小將闗大将外迫門具将發門具將發天目外迫主勝客敗大小将發主人勝不利先起囚主小勝主人勝客大勝客大勝大将外迫主人勝大威八門杜天目大将闗大將外迫門具將發門具將發天目内迫先起敗囚主勝客敗主勝客大勝主大勝主大勝主人小勝大将格主大勝天道門具将發天目外迫大将囚大將格門具将發天目内迫八門杜參將囚客大勝主人勝客勝客大勝主人小勝參将格利先起客勝大武門具將發天目外迫天目格八門杜天目囚門具将發大将囚客大勝大将格主人勝客小勝先起敗大小将迫主大勝大小将囚客大敗客大勝主小