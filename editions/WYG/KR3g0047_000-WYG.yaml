body:
  text: 太乙金鏡式經術數類六隂陽五行之屬提要臣等謹案太乙金鏡式經十卷唐王希明撰希明不詳其里貫開元時以方技為内供奉待詔翰林是書乃其奉勅所編見於新唐書藝文志故書中多自稱臣而其間推太乙積年有至宋景祐元年者則後人已有所增入非盡希眀之舊也史記日者傳術數七家太乙家居其一史記天官書中宮天極星其一明者為太乙常居而封禪書亳人繆忌奏祠太乙方名天神貴者太乙鄭康成以為北辰神名又或以為木神而屈原九歌亦稱東皇太乙則自戰國有此名漢志五行家有太乙陰陽二十三卷當即太乙家之書然已佚不傳惟周易乾鑿度有太乙行九宮法而今所傳次序乃特右旋以乾巽為一九希明謂太乙知未來故聖人為之蹉一位以示先知之義郭璞則謂地缺東南故蹉九以填之樂産又謂太乙之理后王得之以統天下故蹉一以就乾其説頗参差而皆近於附㑹故黄宗羲至詆為經緯混淆行度無稽葢術家又有所汨亂矣核其大㫖乃仿易厯而作其以一為太極因之生二目二目生四輔猶易之兩儀四象也又有計神與太乙合之為八將猶易之八卦也其以嵗月日時為綱而以八將為緯三基五福十精之類為經亦猶夫厯也其法以八將推其掩迫囚擊闗格之類占内外災福又推四神所臨分野占水旱兵䘮饑饉疾疫又推三基五福大小逰二限易卦大運占古今治亂術士傳習其來甚久故漢書已載有陽九百六之語南齊書髙帝紀贊所引太乙九宮占自漢髙祖五年推至宋禎明元年幾數百年而其術遂大顯於世至希明承詔纂次參校衆法益為詳備觀李燾續通鑑長編稱夏主元昊通蕃漢文字嘗推太乙金鑑則其書且行於四裔矣然其所論徴應實多錯謬如東周逢陽九而不及於夏癸商辛少昊帝舜皆以靈神首出周之成宣唐之太宗其時亦可稱治安乃謂與秦始皇同逢百六其說殊不可通且凶神吉星所㑹皆以分野為憑而割裂牽配尤為𣺌茫無據故宋時劉黻亦嘗極議其非宋史劉黻傳黻疏言佞者謂太乙所臨分野則有福近嵗自呉移蜀信如其説坤維安堵可也今五六十州安全者不能十數福何在也葢術數之學如星平壬遯之類所推止及於一身一時匹夫之精神志氣不能與造化相通故韓蘇箕斗蠡種龍蛇亦間為數所操而不能遁然已為聖人所罕言至厯代之治忽興亡則以為克享天心者實在主徳以為凝承之本故聖王御世而八荒賓眼九榖順成時有和甘物無疵癘其太和洋溢自有歛疇錫福之所以然夫豈演紀尋元之可得而推測是書所列乃秦漢間緯書之遺禨祥小數之曲説不衷於正宜為聖人所必斥特以其術為三式之一所傳尚古其書亦出自唐人故附著於録而詳加辨正以祛千古之惑焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀太乙金鏡式經序太乙天帝之神也下司九宮中建皇極欽若則彛倫攸叙怠棄三正錯亂五常黄帝以惠迪吉而為五帝之聖大禹戒從逆凶而衍九疇之文炎漢髙祖受命張良秘金刀之録吳主争權劉惇演炎旌之祥神用於不言之載睿化於無為之間閉户而休咎自徵拂鑑而毫髪皆極非主精妙物執契於混沌之始者又何足以知之爰發上元迄是帝載幾千年而一聖數百年而一賢得隩隅有登龍之喜窺閉鍵而若重闗之隔沿波獨往泛滄海而不歸討本窮源恃孟門之嶄絶至於計神審物天目司姦一三置將之數四六對絶之氣掩迫孤單閉杜十精㬋交較以八節占水旱九州言吉凶五將定主客亦猶兵戈勝負丘明受經而作傳見非公榖子夏師聖而序詩復殊毛魯學而時習之攻乎異端笑他人之闕未忘已拙以蠡測海以管窺天心見之外愚衷謂盡或指陳實録或誕錫嘉名正二局有隂陽之殊糺六壬附時計之謬淮南分野縱博我以多聞黄道日躔竟有疑而則闕源流則廣枝葉扶疎孤裘同士薦之風玉石抵崑山之鵲雖億則屢中時自賢於仲尼而謀之不臧且推過於季氏王大實遂偃弊風國之事多惟慚徳伏惟開元皇帝陛下明極稽疑睿聖作範察璇璣以齊七政制禮樂以穆百揆明太乙之威神封泰山之能事髙視萬古名言謂何神嘉承日月之照荷覆幬之廣參詔賜於金馬觀秘藉於蘭臺嗟此式經有乖㣲㫖乃上稽天象中迹筭術下統人事旁貫嵗時考帝先於神女之符歴載紀於蒼頡之筆甲乙之終數宫元之往復奇偶之二筭勝負之八門與人惎法式之􅄽陣圖水火之失禮樂不興之論周字狂簡之文或義通而即流或理僻而便削皆考經義以一貫之穆若蕙畹聲如玉振夫詩對恵連輙得嘉句筆因樂廣便至能文萬殊皆極而同歸獨見忘言而既騐校之以元紀又精之以日時代謀於述作之前總括於天人之際㑹披覽得意之妙動契合如神之在亦曠代之能事也經凡十卷名曰太乙金境式經若筆削後於孔明用賢則子房升堂風后入室宋琨樂産李淳風屬可座廊廡之下如以爾言過矣將俟来哲
