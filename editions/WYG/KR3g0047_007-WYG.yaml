body:
  text: 太乙金鏡式經卷七唐王希明撰推太乙積年法推天皇太乙法推帝符太乙法推天時太乙法推太尊太乙法推飛鳥太乙法推五行太乙法推八風太乙法推五風太乙法推三風太乙法推太乙數推候十精太乙雲氣法推太嵗有陽九之災法推太乙有百六之厄法推太乙積年法置演紀上元甲子嵗至今大宋景祐元年甲戌嵗得一千一十五萬四十九百五十若考往古每年减一下檢将来每年加一若求小遊太乙并天目所在義見嵗計若月日時並置其積同法求之惟隂遁取陽遁所衝各得所在也推天皇太乙法經曰天皇太乙者在紫㣲宫勾陳口中星曰天皇大帝秉萬國神圖天皇與太乙合東方日暈大風合西方日暈雲氣合在南方大昏合在北方隂昏天皇與飛烏合天小隂雨與天時合有小隂昏與太尊合太隂日月有變與五風合疾風起與太乙計數合有大風雨天皇者置積年以天皇小周二十去之不盡者命起武徳順行十六神至隂徳大炅大武和徳重留一筭外即天皇所在也推帝符太乙法經曰帝符太乙者天節之使也星讃曰天節奉使専對無疑帝符若與太一合則日暈大風若合太乙旺相之地小雨小隂雲氣卒起若帝符與天目合小隂疾風日月有變帝符者置積年以帝符小周二十去之不盡從隂主順行十六神至地主髙叢大威太蔟重留一筭外即帝符所在也推天時太乙法經曰天時太乙者􅄧星之使也雞鳴伺曉審晝夜察天時與太乙合於旺相之地有風雲卒起或則隂雨也天時者置積年以天時小周十二去之不盡命起吕申順行十二辰筭外即天時所在也推太尊太乙法經曰太尊太乙者黄星之長也經曰太尊一星威此聖公太尊與太乙合旺相之地有隂雨寒合八宫日暈合六宫隂昏合二宫太隂昏寒合四宫日暈太尊與飛鳥合天温小雨與帝符合天隂雨大昏與天目合天有隂雨太尊者置積年以太尊小周四除之不盡命起八宫順行四正宫筭外即得太尊所在也推飛鳥太乙法經曰飛鳥太乙者七星之使朱雀之體也飛鳥與太乙合旺相之地天星有變與天皇合有大風雨與天時合有大隂風置積年以飛鳥小周九除之不盡命起一宫順行九宫筭外即飛鳥所在也推五行太乙法經曰五行太乙者五星之使也共變猶影響之與形聲也五行與太乙合旺相之地暴風大寒雲氣昏暗㦯即有雨與天目合有大風隂日月有變與帝符合風昏小隂與太尊合日月有變色小隂與天時合大隂風置積年以五行小周五除之不盡命起一宫以三五七九二四六八筭外即得五行所在也推三風太乙法經曰三風太乙者心星之使也謂心有三星故曰三風也三風與太乙合在旺相之地日月無光寒雲四起與天時合小隂與飛鳥合疾風雲隂日月有變色與太尊合小隂風與帝符合小隂與五風合日月色變與天皇合有小風日月有變與天目合大風雨置積年以三風小周九除之不盡命起三宫次行七二六一五九四八筭外即得三風所在也推五風太乙法經曰五風者箕星之使也箕有五星故曰五風也樂産經云月之精也上元甲子嵗起一宫次行三五七九二四六八周而復始若與太乙合旺相之地主日月連日不見天暴風疾雨置積年數以五風小周天除二九不盡筭外即五風所在也推八風太乙法八風者畢星之使也畢星有八星故曰八風其星好雨近之觜參其星好風樂産經云八政之風氣上元甲子嵗起二宫次順行九宫筭外八風所在也置積年以小周天法九除之命起二宮順行二三五六七八九一宫推太乙數法經曰太乙數者五子元七十二之數也與太乙合日暈大風數與太乙衝者曰暈風起數得三十日暈大風數得四十有隂雨黄霧數得五十與天目合旺相日暈數與太乙挾天目隂雨日暈大風數與飛鳥合六八九宫者日暈數與天地併日暈天十地九數與主計合日暈數與天地相當大風置積年以太乙局法七十二去之不盡命起一筭數外即得太乙數所在也推十精太乙法古者諸賢所論太乙嵗月日時各有篇目推而求之臣等今削去繁蕪撮其精要演紀尋元步厯考數並起上元甲子求嵗月日時之積十精以陽遁所衝即各得隂遁十精所在也推候十精太乙雲氣法經曰常以太乙初移宫日出日午日晡日旁餘二日不使也及時計初移宫時餘二時不使也當候日之上下左右若雲氣色青而日時計得三四則變發在寅夘時若候雲氣赤色而日時計得九二則變發在巳午時若雲氣色白而日時計得七六則變發在申酉時若雲氣色黒而日時計得一八則變發在亥子時也經曰帝符太尊天時五行八風與太乙合在陽宫則為晴旱合在隂宫則為隂雨合隂合陽者在位也天皇與太乙合在陽宫則日暈晝暝天皇與太乙合在隂宫則月暈夜大昏飛鳥與太乙合則風從其下来天氣純厚則雨天氣華薄則風天氣黄霧則暈天氣赤黒則風天氣青白則寒天氣凝潤則霧雨雲氣如掃則晴雲氣色文彩輪囷蕭索則天大晴天旱常以陽占之天雨常以隂占之十精隂陽若得旺相氣則變疾速也推太嵗有陽九之災法陽九災者若入元之始及元之末或與太嵗衝併于分野亡國弑君事也該四千五百六十為一元四百五十六嵗為一陽九也十三年移一邦命起寅邦順行十二邦筭外即陽九所在也置演紀上元甲寅嵗至今唐開元十二年甲子嵗積得一萬三千三百三十一年臣希明今求筭得炎帝熈三十五年庚寅入第二陽九少昊十二年丙寅入第三陽九至夏王相四年壬寅入第四陽九後二十四年為羿所簒也至殷沃丁二十九年戌寅入第五陽九至殷王庚丁十三年甲寅入第六陽九後漸國㣲至帝禄絶至周平王宜臼二十年庚寅入第七陽九王室㣲弱政由方伯至周赧王延二十年丙寅入第八陽九數盡之主至漢桓帝延熹五年壬寅入第九陽九桓靈道喪至獻終亡至隋義寧二年即武徳元年也戊寅嵗入第十陽九隋禄永終歸於我唐至太唐開元十二年以後三百五十年方㑹陽九之數推太乙有百六之厄法百六者太乙之厄若入元之始及元之末或與陽九及太嵗衝并於分野其災為簒弑之禍置積年法以二百八十八年為一周十五周為一元共計四千三百三十為一元也二十四年移一邦命起寅邦順行十二年筭外即百六所在也自炎帝神農一百十三年戊寅入第四百六自帝來二十六年丙寅入第五百六少昊六十八年甲寅入第六百六舜帝五十七年壬寅入第七百六夏王不降三十年庚寅入第八百六殷王小甲四年戊寅入第九百六殷盤庚二十七年丙寅入第十百六至周成王誦二十九年甲寅入第十一百六周宣王二十九年壬寅入第十二百六周敬王九年庚寅入第十三百六秦始皇二十四年戊寅入第十四百六漢明帝永平九年丙寅入第十五百六東晉帝永和十年甲寅入第二元一百六大唐貞觀十六年壬寅入第二元二百六也太乙金鏡式經卷七
